name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "vipulse-backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "vipulse-backend/**"

defaults:
  run:
    working-directory: vipulse-backend

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vipulse-backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongo:
        image: mongo:7.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vipulse-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx pytest-mock fakeredis mongomock-motor pytest-cov

      - name: Run tests with coverage
        env:
          MONGODB_URL:          "mongodb://localhost:27017/vipulse_test"
          REDIS_URL:            "redis://localhost:6379/15"
          GROQ_API_KEY:         "test-key"
          SECRET_KEY:           "test-secret-key-32-chars-minimum!!"
          DISCORD_WEBHOOK_URL:  "https://discord.com/api/webhooks/test/token"
          GMAIL_USER:           "test@gmail.com"
          GMAIL_APP_PASSWORD:   "test-password"
          SENTRY_DSN:           "https://test@sentry.io/0"
          ENVIRONMENT:          "test"
          DASHBOARD_URL:        "http://localhost:3000"
          TEAM_EMAIL_MAP:       ""
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --asyncio-mode=auto \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: vipulse-backend/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Docker Build & Push ──────────────────────────────────────────────────────
  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vipulse-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: vipulse-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Render ─────────────────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
