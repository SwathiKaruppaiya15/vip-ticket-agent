version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# VIPulse AI — local development stack
# Usage:
#   docker-compose up -d               # start all services
#   docker-compose --profile dev up -d # also start mongo-express
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── VIPulse API ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vipulse-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      WORKERS: "2"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - vipulse-net

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: vipulse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vipulse-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: vipulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vipulse-net

  # ── Mongo Express (dev UI) — activate with --profile dev ─────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: vipulse-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER:         mongo
      ME_CONFIG_MONGODB_PORT:           27017
      ME_CONFIG_BASICAUTH_USERNAME:     admin
      ME_CONFIG_BASICAUTH_PASSWORD:     vipulse-dev
      ME_CONFIG_MONGODB_ENABLE_ADMIN:   "true"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - vipulse-net
    profiles:
      - dev

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  vipulse-net:
    driver: bridge
